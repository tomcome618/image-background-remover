<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Background Remover 🖼️</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: white;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
    }
    .user-info {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-details {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    .user-name {
      font-weight: bold;
    }
    .user-email {
      font-size: 0.9em;
      color: rgba(255, 255, 255, 0.8);
    }
    .auth-buttons {
      display: flex;
      gap: 10px;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.9em;
      border: none;
      transition: all 0.3s;
    }
    .login-btn {
      background: #4CAF50;
      color: white;
    }
    .login-btn:hover {
      background: #45a049;
    }
    .logout-btn {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }
    .logout-btn:hover {
      background: rgba(255, 107, 107, 0.3);
    }
    .upload-area {
      border: 3px dashed rgba(255, 255, 255, 0.3);
      border-radius: 15px;
      padding: 60px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 30px;
    }
    .upload-area:hover {
      border-color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.05);
    }
    .upload-area.dragover {
      border-color: #4CAF50;
      background: rgba(76, 175, 80, 0.1);
    }
    #fileInput {
      display: none;
    }
    .upload-label {
      display: block;
      font-size: 1.2em;
      margin-bottom: 10px;
    }
    .upload-hint {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9em;
    }
    .preview-container {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
      margin: 30px 0;
    }
    .preview-box {
      flex: 1;
      min-width: 300px;
      text-align: center;
    }
    .preview-img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      background: white;
      padding: 10px;
    }
    .preview-label {
      margin-top: 10px;
      font-weight: bold;
    }
    .process-btn {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 1.1em;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      display: block;
      margin: 20px auto;
      width: 200px;
    }
    .process-btn:hover {
      background: #45a049;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
    .process-btn:disabled {
      background: #cccccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .loading {
      text-align: center;
      margin: 20px 0;
      display: none;
    }
    .result {
      text-align: center;
      margin-top: 30px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      display: none;
    }
    .download-btn {
      background: #2196F3;
      margin-top: 15px;
    }
    .download-btn:hover {
      background: #1976D2;
    }
    .error {
      color: #ff6b6b;
      text-align: center;
      margin: 20px 0;
      padding: 15px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 10px;
      display: none;
    }
    .footer {
      text-align: center;
      margin-top: 40px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9em;
    }
    .auth-required {
      text-align: center;
      padding: 30px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      margin: 20px 0;
      display: none;
    }
    .google-btn {
      background: white;
      color: #757575;
      border: none;
      padding: 12px 24px;
      font-size: 1em;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 20px auto;
      width: 220px;
    }
    .google-btn:hover {
      background: #f5f5f5;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }
    .google-icon {
      width: 20px;
      height: 20px;
    }
    .api-status {
      text-align: center;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      font-size: 0.9em;
    }
    .api-status.healthy {
      background: rgba(76, 175, 80, 0.2);
      color: #4CAF50;
    }
    .api-status.unhealthy {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- API 状态 -->
    <div class="api-status" id="apiStatus">
      正在检查 API 状态...
    </div>
    
    <!-- 用户信息区域 -->
    <div class="user-info" id="userInfo" style="display: none;">
      <div class="user-details">
        <img id="userAvatar" class="user-avatar" src="" alt="用户头像">
        <div>
          <div id="userName" class="user-name"></div>
          <div id="userEmail" class="user-email"></div>
        </div>
      </div>
      <div class="auth-buttons">
        <button id="logoutBtn" class="btn logout-btn">退出登录</button>
      </div>
    </div>
    
    <!-- 登录提示区域 -->
    <div class="auth-required" id="authRequired">
      <h3>🔐 需要登录</h3>
      <p>请使用 Google 账号登录以使用图片背景移除功能</p>
      <a href="https://image-bg-remover-oauth.tomcome618.workers.dev/api/auth/google" class="google-btn">
        <img src="https://www.google.com/favicon.ico" alt="Google" class="google-icon">
        使用 Google 登录
      </a>
    </div>
    
    <h1>🖼️ Image Background Remover</h1>
    
    <!-- 上传区域 -->
    <div class="upload-area" id="uploadArea" style="display: none;">
      <input type="file" id="fileInput" accept="image/*">
      <label for="fileInput" class="upload-label">
        📁 点击选择图片或拖拽到此处
      </label>
      <div class="upload-hint">
        支持 JPG, PNG, WebP 格式 (最大 10MB)
      </div>
    </div>
    
    <!-- 预览区域 -->
    <div class="preview-container" id="previewContainer" style="display: none;">
      <div class="preview-box">
        <div class="preview-label">原图</div>
        <img id="originalPreview" class="preview-img" src="" alt="原图">
      </div>
      <div class="preview-box">
        <div class="preview-label">处理后</div>
        <img id="processedPreview" class="preview-img" src="" alt="处理后">
      </div>
    </div>
    
    <!-- 处理按钮 -->
    <button class="process-btn" id="processBtn" disabled>开始移除背景</button>
    
    <div class="loading" id="loading">
      <div>🔄 正在处理中，请稍候...</div>
      <div style="margin-top: 10px; font-size: 0.9em;">这可能需要几秒钟时间</div>
    </div>
    
    <div class="error" id="error"></div>
    
    <div class="result" id="result">
      <div>✅ 背景移除完成！</div>
      <a class="process-btn download-btn" id="downloadLink" download>下载图片</a>
    </div>
    
    <div class="footer">
      <p>使用 Remove.bg API 技术 | 完整 OAuth 认证版本</p>
      <p>API: Cloudflare Workers + D1 数据库 | 认证: Google OAuth 2.0</p>
    </div>
  </div>
  
  <script>
    // API 配置
    const API_BASE_URL = 'https://image-bg-remover-oauth.tomcome618.workers.dev'
    
    // DOM 元素
    const apiStatus = document.getElementById('apiStatus')
    const userInfo = document.getElementById('userInfo')
    const authRequired = document.getElementById('authRequired')
    const userAvatar = document.getElementById('userAvatar')
    const userName = document.getElementById('userName')
    const userEmail = document.getElementById('userEmail')
    const logoutBtn = document.getElementById('logoutBtn')
    const uploadArea = document.getElementById('uploadArea')
    const fileInput = document.getElementById('fileInput')
    const previewContainer = document.getElementById('previewContainer')
    const originalPreview = document.getElementById('originalPreview')
    const processBtn = document.getElementById('processBtn')
    const loading = document.getElementById('loading')
    const result = document.getElementById('result')
    const error = document.getElementById('error')
    const downloadLink = document.getElementById('downloadLink')
    const processedPreview = document.getElementById('processedPreview')
    
    let currentFile = null
    let currentUser = null
    
    // 页面加载时初始化
    document.addEventListener('DOMContentLoaded', async () => {
      // 检查 API 状态
      await checkApiStatus()
      
      // 检查用户登录状态
      await checkAuthStatus()
    })
    
    // 检查 API 状态
    async function checkApiStatus() {
      try {
        const response = await fetch(`${API_BASE_URL}/api/health`)
        const data = await response.json()
        
        if (data.status === 'healthy') {
          apiStatus.textContent = '✅ API 服务正常'
          apiStatus.className = 'api-status healthy'
        } else {
          apiStatus.textContent = '⚠️ API 服务异常'
          apiStatus.className = 'api-status unhealthy'
        }
      } catch (error) {
        apiStatus.textContent = '❌ API 服务不可用'
        apiStatus.className = 'api-status unhealthy'
        console.error('API 状态检查失败:', error)
      }
    }
    
    // 检查认证状态
    async function checkAuthStatus() {
      try {
        const response = await fetch(`${API_BASE_URL}/api/auth/me`, {
          credentials: 'include' // 包含 cookies
        })
        
        if (response.status === 401) {
          showLoginPrompt()
          return
        }
        
        const data = await response.json()
        
        if (data.authenticated) {
          currentUser = data.user
          showUserInfo(data.user)
          showAppContent()
        } else {
          showLoginPrompt()
        }
      } catch (error) {
        console.error('认证状态检查失败:', error)
        showLoginPrompt()
      }
    }
    
    // 显示用户信息
    function showUserInfo(user) {
      userAvatar.src = user.picture || 'https://www.gravatar.com/avatar/?d=mp'
      userName.textContent = user.name
      userEmail.textContent = user.email
      userInfo.style.display = 'flex'
    }
    
    // 显示应用内容
    function showAppContent() {
      authRequired.style.display = 'none'
      uploadArea.style.display = 'block'
    }
    
    // 显示登录提示
    function showLoginPrompt() {
      userInfo.style.display = 'none'
      authRequired.style.display = 'block'
      uploadArea.style.display = 'none'
      previewContainer.style.display = 'none'
      processBtn.disabled = true
    }
    
    // 登出按钮点击
    logoutBtn.addEventListener('click', async () => {
      try {
        const response = await fetch(`${API_BASE_URL}/api/auth/logout`, {
          method: 'POST',
          credentials: 'include'
        })
        
        if (response.ok) {
          currentUser = null
          showLoginPrompt()
        }
      } catch (error) {
        console.error('登出失败:', error)
        showError('登出失败，请刷新页面重试')
      }
    })
    
    // 图片上传相关功能
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault()
      uploadArea.classList.add('dragover')
    })
    
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover')
    })
    
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault()
      uploadArea.classList.remove('dragover')
      
      if (e.dataTransfer.files.length) {
        handleFile(e.dataTransfer.files[0])
      }
    })
    
    uploadArea.addEventListener('click', () => {
      fileInput.click()
    })
    
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) {
        handleFile(e.target.files[0])
      }
    })
    
    function handleFile(file) {
      if (!currentUser) {
        showError('请先登录')
        return
      }
      
      if (!file.type.match('image.*')) {
        showError('请选择图片文件')
        return
      }
      
      if (file.size > 10 * 1024 * 1024) {
        showError('文件大小不能超过 10MB')
        return
      }
      
      currentFile = file
      
      const reader = new FileReader()
      reader.onload = (e) => {
        originalPreview.src = e.target.result
        previewContainer.style.display = 'flex'
        processBtn.disabled = false
        hideError()
        hideResult()
      }
      reader.readAsDataURL(file)
    }
    
    // 处理按钮点击
    processBtn.addEventListener('click', async () => {
      if (!currentUser || !currentFile) return
      
      const formData = new FormData()
      formData.append('image', currentFile)
      formData.append('userId', currentUser.id)
      
      loading.style.display = 'block'
      processBtn.disabled = true
      hideError()
      hideResult()
      
      try {
        // 调用图片处理 API
        const response = await fetch('http://43.162.82.13:3000/process', {
          method: 'POST',
          body: formData
        })
        
        const data = await response.json()
        
        if (data.success) {
          processedPreview.src = data.processedUrl
          downloadLink.href = data.processedUrl
          downloadLink.download = 'background-removed.png'
          result.style.display = 'block'
        } else {
          showError(data.error || '图片处理失败')
