name: Test Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build test
        run: npm run build

      - name: Verify build output
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build directory exists"
            ls -la dist/
          else
            echo "❌ Build directory not found"
            exit 1
          fi